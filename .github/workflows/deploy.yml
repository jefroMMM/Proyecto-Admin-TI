name: Deploy VPS

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || '22' }}
          script: |
            set -e
            APP_DIR="${{ secrets.VPS_APP_DIR }}"
            if [ -z "$APP_DIR" ]; then APP_DIR="/opt/proyecto-admin-ti"; fi

            sudo mkdir -p "$APP_DIR"
            sudo chown -R "$USER":"$USER" "$APP_DIR"
            cd "$APP_DIR"

            if [ ! -d .git ]; then
              git clone https://github.com/jefroMMM/Proyecto-Admin-TI.git .
            else
              git pull origin main
            fi

            if [ ! -f .env ]; then
              cp .env.example .env
              echo "WARNING: .env creado desde plantilla. Completa variables reales en el servidor."
            fi

            docker compose pull || true
            docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
            docker image prune -f
            docker ps
