name: Deploy VPS

on:
  workflow_run:
    workflows: ["CI"]
    branches: ["main"]
    types: [completed]

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || '22' }}
          script: |
            set -e
            APP_DIR="${{ secrets.VPS_APP_DIR }}"
            DEPLOY_SHA="${{ github.event.workflow_run.head_sha }}"
            if [ -z "$APP_DIR" ]; then APP_DIR="/opt/proyecto-admin-ti"; fi

            sudo mkdir -p "$APP_DIR"
            sudo chown -R "$USER":"$USER" "$APP_DIR"
            cd "$APP_DIR"

            if [ ! -d .git ]; then
              git clone https://github.com/jefroMMM/Proyecto-Admin-TI.git .
            fi
            git fetch origin main
            git checkout --force "$DEPLOY_SHA"

            if [ ! -f .env ]; then
              cp .env.example .env
              echo "WARNING: .env creado desde plantilla. Completa variables reales en el servidor."
            fi

            docker compose pull || true
            docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
            docker image prune -f
            docker ps

      - name: Verify healthcheck after deploy
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_HEALTHCHECK_URL: ${{ secrets.VPS_HEALTHCHECK_URL }}
        run: |
          set -euo pipefail
          HEALTHCHECK_URL="${VPS_HEALTHCHECK_URL:-http://${VPS_HOST}:8000/healthcheck}"
          curl --fail --show-error --silent \
            --retry 10 \
            --retry-delay 5 \
            --retry-connrefused \
            "$HEALTHCHECK_URL"
