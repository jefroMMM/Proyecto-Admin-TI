services:
  postgres:
    ports: []

  backend:
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
      BACKEND_CORS_ORIGINS: ${BACKEND_CORS_ORIGINS:-http://localhost:3000}
    ports:
      - "8000:8000"
    volumes:
      - backend_audio_data:/app/storage/audio

  frontend:
    ports:
      - "3000:3000"

volumes:
  backend_audio_data:
